services:
  # ── Backend ────────────────────────────────────────────────────────────────
  # DATABASE_URL is injected by the hosting platform
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}   # set this in your shell or .env before running
    ports:
      - "8080:80"
    depends_on:
      - backend
